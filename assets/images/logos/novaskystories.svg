  <!-- The O with teal quarter accents -->
  <g transform="translate(127,30)">
    <text x="0" y="25" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="58" font-weight="700" fill="white" letter-spacing="6">O</text>
  </g>
  <!-- Teal accent pieces inside O -->
