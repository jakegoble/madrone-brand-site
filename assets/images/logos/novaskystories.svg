<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" fill="white">
  <!-- N - geometric with angled diagonal -->
  <polygon points="10,10 30,10 80,70 80,10 100,10 100,80 80,80 30,20 30,80 10,80"/>
  
  <!-- O with teal quarter accents -->
  <circle cx="145" cy="45" r="35" fill="none" stroke="white" stroke-width="14"/>
  <!-- Teal accent: top-right and bottom-left quadrants -->
  <clipPath id="oMask">
    <circle cx="145" cy="45" r="35"/>
  </clipPath>
  <g clip-path="url(#oMask)">
    <!-- Top-right quadrant teal -->
    <rect x="145" y="10" width="40" height="35" fill="#00e5b0"/>
    <!-- Bottom-left quadrant teal -->
    <rect x="105" y="45" width="40" height="35" fill="#00e5b0"/>
    <!-- Cut out inner circle to create ring -->
    <circle cx="145" cy="45" r="22" fill="black"/>
  </g>
  <!-- Re-draw white ring parts -->
  <path d="M145,10 A35,35 0 0,0 110,45" fill="none" stroke="white" stroke-width="14"/>
  <path d="M145,80 A35,35 0 0,0 180,45" fill="none" stroke="white" stroke-width="14"/>
  
  <!-- V -->
  <polygon points="195,10 215,10 240,70 265,10 285,10 250,80 230,80"/>
  
  <!-- A -->
  <polygon points="300,80 320,10 340,10 370,80 350,80 342,60 318,60 310,80"/>
  <polygon points="322,48 338,48 330,25"/>
  
  <!-- SKY STORIES subtitle -->
  <text x="200" y="110" text-anchor="middle" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="22" font-weight="300" letter-spacing="14">SKY STORIES</text>
</svg>
