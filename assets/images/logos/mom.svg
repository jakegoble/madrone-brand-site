<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 110" fill="#b0b0b0">
  <!-- Circular eye/wave logomark -->
  <g transform="translate(55,55)">
    <!-- Outer circular border -->
    <circle cx="0" cy="0" r="42" fill="none" stroke="#b0b0b0" stroke-width="3"/>
    <!-- Left curved horn/wing -->
    <path d="M-42,0 C-52,-18 -52,-38 -42,-48 C-46,-28 -44,-10 -42,0" fill="#b0b0b0"/>
    <path d="M-42,0 C-46,10 -52,28 -42,48 C-52,38 -52,18 -42,0" fill="#b0b0b0"/>
    <!-- Right curved horn/wing -->
    <path d="M42,0 C52,-18 52,-38 42,-48 C46,-28 44,-10 42,0" fill="#b0b0b0"/>
    <path d="M42,0 C46,10 52,28 42,48 C52,38 52,18 42,0" fill="#b0b0b0"/>
    <!-- Inner eye - dark circle with lighter ring -->
    <circle cx="0" cy="0" r="20" fill="#b0b0b0" opacity="0.4"/>
    <circle cx="0" cy="0" r="12" fill="#404040"/>
    <circle cx="0" cy="0" r="8" fill="#b0b0b0" opacity="0.6"/>
  </g>
  <!-- Stacked text: MINDS OVER MATTER -->
  <text x="130" y="35" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="32" font-weight="800" letter-spacing="3">MINDS</text>
  <text x="130" y="68" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="32" font-weight="800" letter-spacing="3">OVER</text>
  <text x="130" y="101" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="32" font-weight="800" letter-spacing="3">MATTER</text>
</svg>
